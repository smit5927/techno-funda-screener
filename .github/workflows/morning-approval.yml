name: 08:30 Funded Portfolio Approval

on:
  workflow_dispatch:
  schedule:
    # The first runner starts early and waits for 08:30. Later entries are recovery attempts.
    - cron: "50 2 * * 1-5" # 08:20 IST, wait until 08:30
    - cron: "5,20,35,40 3 * * 1-5" # 08:35, 08:50, 09:05, 09:10 IST

permissions:
  contents: read

concurrency:
  group: techno-funda-morning-approval
  cancel-in-progress: false

jobs:
  approve-funded-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install runtime dependencies
        run: npm ci --omit=dev

      - name: Hold the early runner until 08:30 IST
        if: github.event_name == 'schedule' && github.event.schedule == '50 2 * * 1-5'
        run: node src/wait-until-ist.js 08:30 15

      - name: Approve only funded 09:17 orders and publish alerts
        run: npm run approve:cloud
        env:
          DATA_DIR: data
          TECHNO_FUNDA_APP_API_URL: https://nsqcjzwfacthxcwguhzw.supabase.co/functions/v1/techno-funda-app-api
          TECHNO_FUNDA_APP_INTERNAL_KEY: ${{ secrets.TECHNO_FUNDA_APP_INTERNAL_KEY }}

