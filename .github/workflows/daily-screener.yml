name: Daily Techno Funda PMS

on:
  workflow_dispatch:
    inputs:
      publish_morning_alerts:
        description: "Emergency morning recovery: approve funded orders and publish alerts"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
      - "site/**"
      - "analysis/**"
      - "config/all-market.csv"
      - "config/universe.csv"
      - "config/custom-list.csv"
  schedule:
    # Full close-basis scans are prepared outside the time-critical order window.
    - cron: "30 13 * * 1-5" # 19:00 IST after market close
    - cron: "0 1 * * 1-5" # 06:30 IST pre-market recovery
    # Fast, idempotent approvals reuse the latest cloud scan and publish only funded actions.
    - cron: "55 2 * * 1-5" # 08:25 IST warm-up
    - cron: "0,5,15,30,40 3 * * 1-5" # 08:30, 08:35, 08:45, 09:00, 09:10 IST
    # Staggered lightweight retries tolerate delays in GitHub's free scheduled runners.
    - cron: "51 3 * * 1-5" # 09:21 IST
    - cron: "59 3 * * 1-5" # 09:29 IST
    - cron: "11 4 * * 1-5" # 09:41 IST
    - cron: "25 4 * * 1-5" # 09:55 IST
    - cron: "40 4 * * 1-5" # 10:10 IST

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: techno-funda-screener
  cancel-in-progress: false

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MORNING_APPROVAL: ${{ (github.event_name == 'schedule' && (github.event.schedule == '55 2 * * 1-5' || github.event.schedule == '0,5,15,30,40 3 * * 1-5')) || (github.event_name == 'workflow_dispatch' && inputs.publish_morning_alerts == true) }}
      EXECUTION_ONLY: ${{ github.event_name == 'schedule' && (github.event.schedule == '51 3 * * 1-5' || github.event.schedule == '59 3 * * 1-5' || github.event.schedule == '11 4 * * 1-5' || github.event.schedule == '25 4 * * 1-5' || github.event.schedule == '40 4 * * 1-5') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Refresh Nifty 500 universe
        if: env.EXECUTION_ONLY != 'true' && env.MORNING_APPROVAL != 'true'
        run: npm run update:universe
        continue-on-error: true

      - name: Refresh all Indian equity universe and new listings
        if: env.EXECUTION_ONLY != 'true' && env.MORNING_APPROVAL != 'true'
        run: npm run update:all-market
        continue-on-error: true

      - name: Run completed-close cloud screener
        if: env.EXECUTION_ONLY != 'true' && env.MORNING_APPROVAL != 'true'
        run: npm run scan:cloud
        env:
          DATA_DIR: data
          DEFAULT_WATCHLIST_PATH: config/universe.csv
          ALL_MARKET_WATCHLIST_PATH: config/all-market.csv
          CUSTOM_WATCHLIST_PATH: config/custom-list.csv
          BENCHMARK_SYMBOL: ^CRSLDX
          FUNDAMENTALS_ENABLED: "true"
          FUNDAMENTALS_CACHE_DAYS: "7"
          CORPORATE_ACTIONS_ENABLED: "true"
          CORPORATE_ACTIONS_LOOKBACK_DAYS: "400"
          SCAN_CONCURRENCY: "12"
          MAX_SYMBOLS: "0"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SEND_EMPTY: "false"
          TELEGRAM_RETRY_FAILED_EVENTS_MAX_HOURS: "12"
          TELEGRAM_MORNING_ONLY: "false"
          TRADE_CAPITAL_PER_STOCK: "100000"
          TRADE_TOTAL_CAPITAL: "1000000"
          TRADE_MINIMUM_INITIAL_ALLOCATION: "10000"
          TRADE_MAX_OPEN_POSITIONS: "15"
          TRADE_AUTO_POSITION_BREADTH: "true"
          TRADE_PARTIAL_PROFIT_R: "2"
          TRADE_MAX_POSITION_PCT: "10"
          TRADE_RISK_PER_TRADE_PCT: "1"
          TRADE_MAX_PORTFOLIO_RISK_PCT: "6"
          TRADE_MAX_SECTOR_EXPOSURE_PCT: "25"
          TRADE_SCOPE_LIST_ID: "all-market"
          TRADE_QUALITY_MODE: "BEST_ONLY"
          TECHNO_FUNDA_CLOUD_API_URL: https://ywvwsumwhmfkqrqrxsvs.supabase.co/functions/v1/techno-funda-api
          TECHNO_FUNDA_INTERNAL_KEY: ${{ secrets.TECHNO_FUNDA_INTERNAL_KEY }}
          TECHNO_FUNDA_APP_API_URL: https://nsqcjzwfacthxcwguhzw.supabase.co/functions/v1/techno-funda-app-api
          TECHNO_FUNDA_APP_INTERNAL_KEY: ${{ secrets.TECHNO_FUNDA_APP_INTERNAL_KEY }}
          AI_REVIEW_ENABLED: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve funded 09:17 orders and publish 08:30 alerts
        if: env.MORNING_APPROVAL == 'true'
        run: npm run approve:cloud
        env:
          DATA_DIR: data
          TECHNO_FUNDA_APP_API_URL: https://nsqcjzwfacthxcwguhzw.supabase.co/functions/v1/techno-funda-app-api
          TECHNO_FUNDA_APP_INTERNAL_KEY: ${{ secrets.TECHNO_FUNDA_APP_INTERNAL_KEY }}

      - name: Process pending 09:17 executions without Telegram
        if: env.EXECUTION_ONLY == 'true'
        run: npm run execute:cloud
        env:
          DATA_DIR: data
          DEFAULT_WATCHLIST_PATH: config/universe.csv
          ALL_MARKET_WATCHLIST_PATH: config/all-market.csv
          CUSTOM_WATCHLIST_PATH: config/custom-list.csv
          BENCHMARK_SYMBOL: ^CRSLDX
          CORPORATE_ACTIONS_ENABLED: "true"
          CORPORATE_ACTIONS_LOOKBACK_DAYS: "400"
          TRADE_CAPITAL_PER_STOCK: "100000"
          TRADE_TOTAL_CAPITAL: "1000000"
          TRADE_MINIMUM_INITIAL_ALLOCATION: "10000"
          TRADE_MAX_OPEN_POSITIONS: "15"
          TRADE_AUTO_POSITION_BREADTH: "true"
          TRADE_PARTIAL_PROFIT_R: "2"
          TRADE_MAX_POSITION_PCT: "10"
          TRADE_RISK_PER_TRADE_PCT: "1"
          TRADE_MAX_PORTFOLIO_RISK_PCT: "6"
          TRADE_MAX_SECTOR_EXPOSURE_PCT: "25"
          TRADE_SCOPE_LIST_ID: "all-market"
          TRADE_QUALITY_MODE: "BEST_ONLY"
          TECHNO_FUNDA_CLOUD_API_URL: https://ywvwsumwhmfkqrqrxsvs.supabase.co/functions/v1/techno-funda-api
          TECHNO_FUNDA_INTERNAL_KEY: ${{ secrets.TECHNO_FUNDA_INTERNAL_KEY }}
          TECHNO_FUNDA_APP_API_URL: https://nsqcjzwfacthxcwguhzw.supabase.co/functions/v1/techno-funda-app-api
          TECHNO_FUNDA_APP_INTERNAL_KEY: ${{ secrets.TECHNO_FUNDA_APP_INTERNAL_KEY }}

      - name: Build mobile website
        run: npm run build:static

      - name: Commit updated scan and trade sheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/all-market.csv config/universe.csv config/custom-list.csv data/fundamentals-cache.json data/techno-funda-trade-sheet.xlsx data/techno-funda-trade-sheet.csv
          git diff --cached --quiet || git commit -m "Update techno funda screener data"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
